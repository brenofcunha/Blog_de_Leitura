{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Blog de Leitura{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'leitura/styles.css' %}">
</head>
<body>
    <main class="container">
        <nav class="auth-nav">
            {% if user.is_authenticated %}
                <span>Olá, {{ user.username }}.</span>
                <a href="{% url 'logout' %}">Sair</a>
            {% else %}
                <a href="{% url 'login' %}">Entrar</a>
            {% endif %}
        </nav>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
