{% extends "views/base.html" %}

{% block title %}{{ page_title }} | Portal de Posts{% endblock %}

{% block content %}
<section class="section" style="max-width: 760px;">
    <div class="section-head">
        <h1>{{ page_title }}</h1>
    </div>

    <form method="post" class="login-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="button" type="submit" name="action" value="save_draft">Salvar rascunho</button>
        <button class="button" type="submit" name="action" value="publish">Publicar</button>
        <button class="button" type="submit" name="action" value="save">{{ submit_label }}</button>
    </form>

    <p style="margin-top: 1rem;">
        <a href="{% url 'admin_posts' %}">Voltar para a listagem</a>
    </p>
</section>
{% endblock %}
